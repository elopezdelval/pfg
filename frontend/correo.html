    <link rel="icon" type="image/png" href="/img/Logo.png">

    <link rel="stylesheet" href="/src/styles/styles.css">

    <script type="module" src="/src/scripts/correo.js"></script>
</head>

<body>
    <!-- Fondo y menú de navegación -->
    <div class="fondo"></div>
    <nav class="navBar">
        <div class="logoTitulo">
            <img src="/img/Logo.png" alt="logo" class="logo" />
            <span class="titulo">La Grupeta</span>
        </div>

        <div class="divMenu">
            <ul class="menu" id="menu">
                <li><a href="/miActividad.html" class="menuLink">Mi actividad</a></li>
                <li><a href="/crearQuedada.html" class="menuLink">Crear quedada</a></li>
                <li><a href="/tablon.html" class="menuLink">Tablón</a></li>

            <button type="button" id="desplegable">☰</button>
        </div>
    </nav>
    <h1 class="tituloPagina">Mensajes recibidos</h1>
    <main class="correoContainer">
        <form action="" id="formRedactar">
            <button type="button" id="cerrarRedactar">X</button>

            <label for="destinatarioRedactar">Destinatario</label>
            <input type="text" id="destinatarioRedactar" name="destinatarioRedactar">

            <label for="asuntoRedactar">Asunto</label>
            <input type="text" id="asuntoRedactar" name="asuntoRedactar">

            <label for="mensajeRedactar">Mensaje</label>
            <textarea name="mensajeRedactar" id="mensajeRedactar"></textarea>

            <button type="button" id="enviarMensaje">Enviar</button>
        </form>
        <div id="contenedorMensaje">

        </div>
        <ul class="menuCorreo">
            <li><button id="redactarCorreo">Redactar</button></li>
            <li class="correoLink">Enviados</li>
            <li class="correoLink">Recibidos</li>
            <li class="correoLink">Papelera</li>
        </ul>
        <div class="contenedorBuzones">
            <div id="recibidos">
                
            </div>
            <div id="enviados">
                
            </div>
            <div id="eliminados">
                
            </div>
        </div>

    </main>

    <footer>
