<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Grupeta | Crear Quedada</title>
    <link rel="icon" type="image/png" href="/img/Logo.png">

    <link rel="stylesheet" href="/src/styles/styles.css">

    <script type="module" src="/src/scripts/crearQuedada.js"></script>
</head>

<body>
    <!-- Fondo y menú de navegación -->
    <div class="fondo"></div>
    <nav class="navBar">
        <div class="logoTitulo">
            <img src="/img/Logo.png" alt="logo" class="logo" />
            <span class="titulo">La Grupeta</span>
        </div>

        <div class="divMenu">
            <ul class="menu" id="menu">
                <li><a href="/miActividad.html" class="menuLink">Mi actividad</a></li>
                <li><a href="/crearQuedada.html" class="menuLink">Crear quedada</a></li>
                <li><a href="/tablon.html" class="menuLink">Tablón</a></li>
                <li><a href="/perfil.html" class="menuLink">Perfil</a></li>
            </ul>
            <a href="/correo.html"><img src="/img/correo.png" alt="correo" id="correo"></a>
            <button type="button" id="desplegable">☰</button>
        </div>
    </nav>
    <h1 class="tituloPagina">Crea tu quedada</h1>
    <!-- Mapa y formulario de creación de quedada -->
    <main class="editarMapa">
        <section class="cajaMapa">
            <div id="mapa"></div>
            <button type="button" id="borrarTramo">Borrar tramo</button>
            <button type="button" id="borrarTodo">Reiniciar ruta</button>
        </section>
        <section class="ajustesQuedada">
            <form action="" id="formQuedada">
                <span id="distanciaRuta">Distancia: </span>
                <label for="actividad">Actividad</label>
                <select name="actividad" id="actividad">
                    <option value="" disabled selected>Elige tu deporte</option>
                    <option value="ciclismo">Ciclismo</option>
                    <option value="running">Running</option>
                    <option value="senderismo">Senderismo</option>
                </select>

                <label for="pais">País</label>
                <select name="pais" id="pais">
                    <option value="" disabled selected>Elige el país</option>
                </select>

                <label for="region">Región / Provincia</label>
                <select name="region" id="region">
                    <option value="" disabled selected>-</option>
                </select>

                <label for="fechaQuedada">Fecha y hora de la quedada</label>
                <input id="fechaQuedada" name="fechaQuedada" type="datetime-local">

                <label for="ritmo">Ritmo/Duración estimada</label>
                <input id="rimo" name="ritmo" type="text">

                <label for="descripcion">Descripción/Comentarios</label>
                <textarea name="descripcion" id="descripcion"></textarea>

                <button type="button" id="crearQuedada">Crear Quedada</button>
                <span id="error"></span>
            </form>
        </section>
    </main>
    <footer>
        <span class="textoFooter">Creada por Enrique López del Val - Contacto: <a href="">elopezdelval@gmail.com</a></span>
    </footer>
</body>

</html>
